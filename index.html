<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المخزن والصيانة</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --card-bg: #ffffff;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary-color);
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #1a252f;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        @media (max-width: 600px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل حركة صيانة ومخزن</h2>
    <form id="maintenanceForm">
        
        <div class="row">
            <!-- الكود / الباركود -->
            <div class="col form-group">
                <label for="itemCode">كود القطعة / الباركود:</label>
                <input type="text" id="itemCode" required placeholder="امسح الباركود أو اكتب الكود">
            </div>
            
            <!-- اسم القطعة -->
            <div class="col form-group">
                <label for="itemName">اسم القطعة / الصنف:</label>
                <input type="text" id="itemName" required placeholder="مثال: ذراع PS4 أصلي">
            </div>
        </div>

        <div class="row">
            <!-- الكمية -->
            <div class="col form-group">
                <label for="quantity">الكمية:</label>
                <input type="number" id="quantity" min="1" value="1" required>
            </div>

            <!-- الحالة -->
            <div class="col form-group">
                <label for="status">الحالة / نوع الحركة:</label>
                <select id="status" required>
                    <option value="صيانة">تحت الصيانة</option>
                    <option value="تمت الصيانة">تمت الصيانة (جاهز)</option>
                    <option value="تالف">تالف / تكهين</option>
                    <option value="مخزن">متاح في المخزن</option>
                </select>
            </div>
        </div>

        <!-- تفاصيل العطل أو الملاحظات -->
        <div class="form-group">
            <label for="notes">تفاصيل العطل / الملاحظات:</label>
            <textarea id="notes" rows="4" placeholder="اكتب تفاصيل الصيانة أو العطل هنا..."></textarea>
        </div>

        <!-- زر الإرسال -->
        <button type="submit" class="btn-submit">حفظ البيانات</button>
    </form>
</div>

<script>
    document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // تجميع البيانات لإرسالها إلى Google Apps Script أو قاعدة البيانات
        const formData = {
            itemCode: document.getElementById('itemCode').value,
            itemName: document.getElementById('itemName').value,
            quantity: document.getElementById('quantity').value,
            status: document.getElementById('status').value,
            notes: document.getElementById('notes').value,
            timestamp: new Date().toLocaleString('ar-EG')
        };

        console.log('تم تجهيز البيانات بنجاح:', formData);
        
        // هنا يتم الربط مع الـ Backend الخاص بك
        // google.script.run.withSuccessHandler(onSuccess).saveData(formData);
        
        alert('تم حفظ البيانات بنجاح!');
        this.reset();
    });
</script>

</body>
</html>
